<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      padding: 12px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4338ca; }
    .input-row button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    li:hover { background: #f7fafc; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    .status-bar {
      font-size: 0.8rem;
      color: #a0aec0;
      text-align: right;
      margin-bottom: 8px;
      min-height: 1.2em;
    }

    .status-bar.error { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="newItem" type="text" placeholder="아이템 입력..." autocomplete="off">
      <button id="addBtn">추가</button>
    </div>

    <div class="status-bar" id="statusBar"></div>
    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div id="empty" class="empty">아직 아이템이 없어요.<br>위에서 추가해 보세요!</div>

    <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vpsuzhpwlnwpfxzjltlr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwc3V6aHB3bG53cGZ4empsdGxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTQxNTQsImV4cCI6MjA5MjE3MDE1NH0.c6C2EWNIKTPUDsrb0SzQJwciE39xzmk80vA47KiCaVg';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    function setStatus(msg, isError = false) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = 'status-bar' + (isError ? ' error' : '');
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
      } else {
        empty.style.display = 'none';
        const done = items.filter(i => i.checked).length;
        stats.textContent = `전체 ${items.length}개 · 완료 ${done}개`;

        items.forEach(item => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = item.checked;
          checkbox.addEventListener('change', () => toggle(item.id, !item.checked));

          const span = document.createElement('span');
          span.className = 'item-text';
          span.textContent = item.text;

          const delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.title = '삭제';
          delBtn.textContent = '✕';
          delBtn.addEventListener('click', () => remove(item.id));

          li.appendChild(checkbox);
          li.appendChild(span);
          li.appendChild(delBtn);
          list.appendChild(li);
        });
      }
    }

    async function loadItems() {
      setStatus('불러오는 중...');
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        setStatus('불러오기 실패: ' + error.message, true);
        return;
      }
      items = data;
      setStatus('');
      render();
    }

    async function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) return;

      const addBtn = document.getElementById('addBtn');
      addBtn.disabled = true;
      setStatus('저장 중...');

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();

      addBtn.disabled = false;

      if (error) {
        setStatus('저장 실패: ' + error.message, true);
        return;
      }

      items.unshift(data);
      setStatus('');
      render();
      input.value = '';
      input.focus();
    }

    async function toggle(id, newChecked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked: newChecked })
        .eq('id', id);

      if (error) {
        setStatus('업데이트 실패: ' + error.message, true);
        await loadItems();
        return;
      }

      const item = items.find(i => i.id === id);
      if (item) item.checked = newChecked;
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);
    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) addItem();
    });

    loadItems();
  </script>
</body>
</html>
